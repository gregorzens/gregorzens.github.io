<!-- open pages at the top: stop the browser restoring a stale scroll position (keeps #section deep-links working) -->
<script>
  if ('scrollRestoration' in history) { history.scrollRestoration = 'manual'; }
  window.addEventListener('load', function () {
    if (!window.location.hash) { window.scrollTo(0, 0); }
  });
</script>

<!-- elegant restyle -->
<style type="text/css">
  :root{
    --paper:#ffffff;
    --ink:#222428;
    --muted:#6B6F76;
    --accent:#4F6A52;        /* deepened Otto Wagner / Stadtbahn reseda green */
    --accent-strong:#3B5340;
    --rule:#E6E6E6;
    --gold:#CBB079;          /* whisper of Wagner's Blattgold, for section rules */
    --font:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  /* base */
  html, body{ background:var(--paper); }
  body{
    font-family:var(--font);
    color:var(--ink);
    font-size:17px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  .page__content, .page__content p, .page__content li{
    font-family:var(--font);
    font-size:1rem;
    line-height:1.62;
    color:var(--ink);
  }
  p{ margin:0 0 1.05em; }

  /* content links — single underline on hover */
  .page__content a{
    color:var(--accent);
    text-decoration:none;
  }
  .page__content a:hover{
    color:var(--accent-strong);
    text-decoration:underline;
    text-decoration-thickness:1px;
    text-underline-offset:2px;
  }

  /* section headers */
  .page__content h2{
    font-family:var(--font);
    font-weight:600;
    font-size:1.4rem;
    letter-spacing:-.005em;
    color:var(--ink);
    margin:2.4rem 0 .9rem;
    padding-bottom:.35rem;
    border-bottom:1px solid var(--gold);
  }
  .page__content h2 .header-link{ display:none; }
  .page__content > h2:first-child{ margin-top:.4rem; }

  /* sub-headers (e.g. Journal Articles, Discussions) */
  .page__content h3{
    font-family:var(--font);
    font-weight:600;
    font-size:1.02rem;
    letter-spacing:.005em;
    color:#3C4046;
    margin:1.55rem 0 .55rem;
    border:0;
  }
  .page__content h3 .header-link{ display:none; }

  .page__content strong{ font-weight:600; }

  /* bracketed reference tags: smaller, with muted brackets; links stay legible */
  .page__content .refs{
    font-size:.85em;
    color:var(--muted);
  }
  .page__content .refs a{ color:var(--accent); }
  .page__content .refs a:hover{ color:var(--accent-strong); }

  /* lists: a touch of air between entries */
  .page__content ul{ margin:0 0 1.15em; }
  .page__content li{ margin-bottom:.75em; }

  /* ---- masthead: quiet, hairline-ruled ---- */
  .masthead{
    background:var(--paper);
    border-bottom:1px solid var(--rule);
    box-shadow:none;
    position:relative;
    z-index:100;
  }
  .greedy-nav{ background:var(--paper); }
  .greedy-nav .visible-links a,
  .greedy-nav .hidden-links a{
    font-family:var(--font);
    text-transform:none;
    letter-spacing:.02em;
    font-size:.95rem;
    color:#4A4D52;
  }
  /* clear, understated hover effect on the nav */
  .greedy-nav .visible-links a:hover,
  .greedy-nav .hidden-links a:hover{
    color:var(--accent-strong);
    text-decoration:underline;
    text-decoration-thickness:1px;
    text-underline-offset:4px;
  }
  /* hide the theme's animated grow-bar so only the clean underline shows */
  .greedy-nav .visible-links a:before{ display:none; }
  /* current page: a persistent green underline for orientation */
  .greedy-nav .visible-links a.current,
  .greedy-nav .hidden-links a.current{
    color:var(--accent);
    text-decoration:underline;
    text-decoration-thickness:1px;
    text-underline-offset:4px;
  }
  /* the wordmark (site name) */
  .greedy-nav .masthead__menu-item--lg a,
  .masthead__menu-item--lg a{
    font-family:var(--font);
    font-weight:600;
    font-size:1.2rem;
    letter-spacing:-.005em;
    color:var(--ink);
  }
  .greedy-nav .masthead__menu-item--lg a:hover{ text-decoration:none; color:var(--ink); }
  .greedy-nav .hidden-links{ background:var(--paper); border:1px solid var(--rule); box-shadow:none; z-index:20; }

  /* ---- author sidebar: match the rest of the site ---- */
  .sidebar .author__name, .author__name{
    font-family:var(--font);
    font-weight:600;
    letter-spacing:-.005em;
    color:var(--ink);
  }
  .sidebar .author__bio, .author__bio,
  .sidebar .author__urls li, .author__urls li{
    font-family:var(--font);
    color:var(--muted);
  }
  .author__avatar img{
    max-width:140px;
    border:1px solid var(--rule);
    -webkit-clip-path:circle(50%);
    clip-path:circle(50%);
  }
  /* easter egg: swap the profile photo on hover (replace images/profile-hover.png) */
  /* the circular clip-path also limits the hover hit-area to the circle */
  .author__avatar img:hover{
    content:url("/images/profile-hover.png");
  }
  .author__urls a{ color:var(--accent); text-decoration:none; }
  .author__urls a:hover{ color:var(--accent-strong); text-decoration:underline; text-underline-offset:2px; }

  /* footer: quiet it down */
  .page__footer{ background:var(--paper); border-top:1px solid var(--rule); }
  .page__footer, .page__footer a, .page__footer-follow .social-icons a{ color:var(--muted); }

  /* 404 / any stray page title kept modest */
  .page__title{
    font-family:var(--font);
    font-weight:600;
    letter-spacing:-.005em;
  }
  /* ---- mobile (below the $large 1200px sidebar breakpoint) ---- */
  @media (max-width:1199px){
    /* stack the author block and centre it, with a larger photo */
    .author__avatar,
    .author__content,
    .author__urls-wrapper{
      display:block;
      text-align:center;
    }
    .author__avatar{ width:auto; margin:0 auto 12px; }
    .author__avatar img{
      display:block;
      margin:0 auto;
      width:100%;
      max-width:170px;
    }
    .author__content{ margin-bottom:10px; }
    /* links flow inline under the bio instead of as an absolute popup overlay */
    .author__urls{
      display:block !important;       /* override the theme JS that hides/positions it */
      position:static !important;
      right:auto;
      margin:0 auto !important;
      padding:0 !important;
      border:0 !important;
      background:transparent !important;
      box-shadow:none !important;
    }
    .author__urls:before,
    .author__urls:after{ display:none !important; }
    .author__urls li{ white-space:normal; }
  }

  /* mobile: keep the header only on the about (home) page */
  @media (max-width:768px){
    .masthead--sub{ display:none; }
  }
</style>
<!-- end custom head snippets -->
